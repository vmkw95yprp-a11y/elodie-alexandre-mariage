<head>

```
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Élodie & Alexandre — Notre mariage</title>

<style>

    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    body {

        font-family: Georgia, serif;

        background: #f8f6f2;

        color: #333;

        min-height: 100vh;

    }

    .page {

        max-width: 1000px;

        margin: auto;

        padding: 70px 25px;

    }

    header {

        text-align: center;

        margin-bottom: 80px;

    }

    h1 {

        font-size: clamp(3rem, 8vw, 6rem);

        font-weight: normal;

        margin-bottom: 20px;

    }

    .subtitle {

        font-size: 1.2rem;

        color: #777;

        letter-spacing: 0.08em;

    }

    .menu {

        display: grid;

        grid-template-columns: repeat(2, 1fr);

        gap: 30px;

        max-width: 800px;

        margin: auto;

    }

    .menu a {

        display: flex;

        align-items: center;

        justify-content: center;

        min-height: 180px;

        background: white;

        color: #333;

        text-decoration: none;

        font-size: 1.6rem;

        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);

        transition: transform 0.3s ease, box-shadow 0.3s ease;

    }

    .menu a:hover {

        transform: translateY(-5px);

        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);

    }

    @media (max-width: 700px) {

        .page {

            padding: 50px 20px;

        }

        .menu {

            grid-template-columns: 1fr;

        }

    }

</style>
```
