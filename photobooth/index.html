<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Photobooth — Élodie & Alexandre</title>

<style>

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #faf9f7;
    color: #333;
    text-align: center;
}

h1 {
    margin: 30px 0 10px;
    font-size: 28px;
}

/* GALERIE */

.gallery {

    display: grid;

    grid-template-columns: repeat(3, 1fr);

    gap: 20px;

    max-width: 1000px;

    margin: 40px auto;

    padding: 0 20px;

}

.photo {

    aspect-ratio: 1 / 1;

    overflow: hidden;

    cursor: pointer;

    transition: transform 0.2s ease;

}

.photo:hover {

    transform: scale(1.04);

}

.photo img {

    width: 100%;

    height: 100%;

    object-fit: cover;

    display: block;

}

/* FENÊTRE PRINCIPALE */

.viewer {

    display: none;

    position: fixed;

    inset: 0;

    background: rgba(0, 0, 0, 0.94);

    z-index: 100;

    align-items: center;

    justify-content: center;

    padding: 20px;

}

.viewer.active {

    display: flex;

}

.viewer-content {

    width: 100%;

    max-width: 1200px;

}

/* PHOTO PRINCIPALE */

.main-photo-container {

    height: 70vh;

    display: flex;

    align-items: center;

    justify-content: center;

}

.main-photo {

    max-width: 100%;

    max-height: 70vh;

    object-fit: contain;

    cursor: zoom-in;

}

/* PLEIN ÉCRAN */

.fullscreen {

    display: none;

    position: fixed;

    inset: 0;

    background: black;

    z-index: 300;

    align-items: center;

    justify-content: center;

}

.fullscreen.active {

    display: flex;

}

.fullscreen img {

    max-width: 100vw;

    max-height: 100vh;

    object-fit: contain;

}

.fullscreen-close {

    position: fixed;

    top: 15px;

    right: 25px;

    color: white;

    font-size: 42px;

    cursor: pointer;

    z-index: 310;

}

/* FLÈCHES */

.arrow {

    position: fixed;

    top: 50%;

    transform: translateY(-50%);

    border: none;

    background: rgba(255, 255, 255, 0.15);

    color: white;

    font-size: 45px;

    width: 55px;

    height: 80px;

    cursor: pointer;

    z-index: 110;

}

.arrow:hover {

    background: rgba(255, 255, 255, 0.35);

}

.arrow-left {

    left: 20px;

}

.arrow-right {

    right: 20px;

}

/* MINIATURES */

.thumbnails {

    display: flex;

    justify-content: center;

    align-items: center;

    gap: 10px;

    margin-top: 20px;

    overflow: hidden;

    min-height: 90px;

}

.thumbnail {

    width: 75px;

    height: 75px;

    object-fit: cover;

    opacity: 0.45;

    cursor: pointer;

    border: 2px solid transparent;

}

.thumbnail.active {

    opacity: 1;

    border-color: white;

    transform: scale(1.08);

}

/* BOUTONS */

.actions {

    display: flex;

    justify-content: center;

    gap: 12px;

    margin-top: 20px;

    flex-wrap: wrap;

}

.actions button {

    border: none;

    padding: 10px 16px;

    cursor: pointer;

    font-size: 14px;

    border-radius: 4px;

}

.download {

    background: white;

    color: #222;

}

.download-group {

    background: #72000b;

    color: white;

}

/* FERMER */

.close {

    position: fixed;

    top: 15px;

    right: 25px;

    color: white;

    font-size: 42px;

    cursor: pointer;

    z-index: 120;

}

/* COMPTEUR */

.counter {

    color: white;

    margin-top: 12px;

    font-size: 14px;

    opacity: 0.8;

}

/* MOBILE */

@media (max-width: 700px) {

    h1 {

        font-size: 23px;

        margin-top: 22px;

    }

    .gallery {

        grid-template-columns: repeat(2, 1fr);

        gap: 8px;

        padding: 0 8px;

        margin-top: 25px;

    }

    .viewer {

        padding: 10px;

    }

    .main-photo-container {

        height: 65vh;

    }

    .main-photo {

        max-width: 90vw;

        max-height: 65vh;

    }

    .arrow {

        width: 38px;

        height: 58px;

        font-size: 30px;

    }

    .arrow-left {

        left: 3px;

    }

    .arrow-right {

        right: 3px;

    }

    .thumbnail {

        width: 55px;

        height: 55px;

    }

    .actions button {

        font-size: 13px;

        padding: 9px 12px;

    }

}

</style>

</head>

<body>

<h1>Le photobooth 📸</h1>

<div
    class="gallery"
    id="gallery">
</div>

<!-- FENÊTRE PRINCIPALE -->

<div
    class="viewer"
    id="viewer">

    <span

        id="close">

        ›

        </div>

        <div
            id="thumbnails"
            class="thumbnails">

        </div>

        <div
            class="actions">

            <button
                class="download"
                id="downloadPhoto">

                ⬇️ Télécharger cette photo

            </button>

            <button
                class="download-group"
                id="downloadGroup">

                📦 Télécharger le groupe

            </button>

        </div>

        <div
            id="counter"
            class="counter">

        </div>

    </div>

</div>

<!-- MODE PLEIN ÉCRAN -->

<div
    class="fullscreen"
    id="fullscreen">

    <span
        class="fullscreen-close"
        id="fullscreenClose">

        &times;

    </span>

    <button
        class="arrow arrow-left"
        id="fullscreenPrevious">

        ‹

    </button>

    <img
        id="fullscreenPhoto">

    <button
        class="arrow arrow-right"
        id="fullscreenNext">

    </button>

</div>

/*
    ON REGROUPE TOUTES LES PHOTOS
*/

const toutesLesPhotos = [

    ...photos,

    ...photosPhotographe

];


/*
    EXTRACTION DE LA DATE ET DE L'HEURE

    Format :

    20260523_184901

    ou :

    IMG_7134_20260523_184837_3600.JPG
*/

function obtenirDatePhoto(nom) {

    const correspondance = nom.match(

        /(\d{8})_(\d{6})/

    );

    if (!correspondance) {

        return 0;

    }

    const date = correspondance[1];

    const heure = correspondance[2];

    return Number(

        date + heure

    );

}


/*
    TRI CHRONOLOGIQUE

    Du plus tôt au plus tard
*/

toutesLesPhotos.sort(

    function(a, b) {

        return (

            obtenirDatePhoto(a) -

            obtenirDatePhoto(b)

        );

    }

);


/*
    ÉLÉMENTS HTML
*/

const gallery = document.getElementById("gallery");

const viewer = document.getElementById("viewer");

const fullscreen = document.getElementById("fullscreen");

const mainPhoto = document.getElementById("mainPhoto");

const fullscreenPhoto = document.getElementById("fullscreenPhoto");

const thumbnails = document.getElementById("thumbnails");

const counter = document.getElementById("counter");


let photoActuelle = 0;


/*
    CRÉATION DE LA GALERIE
*/

toutesLesPhotos.forEach(

    function(photo, index) {

        const div = document.createElement("div");

        div.className = "photo";


        const img = document.createElement("img");

        img.src = dossier + photo;

        img.loading = "lazy";


        div.appendChild(img);


        div.onclick = function() {

            photoActuelle = index;

            afficherPhoto();

            viewer.classList.add("active");

            document.body.style.overflow = "hidden";

        };


        gallery.appendChild(div);

    }

);


/*
    AFFICHER LA PHOTO
*/

function afficherPhoto() {

    const photo = toutesLesPhotos[photoActuelle];


    mainPhoto.src = dossier + photo;

    fullscreenPhoto.src = dossier + photo;


    counter.textContent =

        (photoActuelle + 1)

        + " / "

        + toutesLesPhotos.length;


    afficherMiniatures();

}


/*
    MINIATURES

    On affiche quelques photos autour
    de la photo actuelle.
*/

function afficherMiniatures() {

    thumbnails.innerHTML = "";


    const debut = Math.max(

        0,

        photoActuelle - 2

    );


    const fin = Math.min(

        toutesLesPhotos.length,

        photoActuelle + 3

    );


    for (

        let i = debut;

        i < fin;

        i++

    ) {

        const thumbnail = document.createElement("img");


        thumbnail.src =

            dossier +

            toutesLesPhotos[i];


        thumbnail.className = "thumbnail";


        if (

            i === photoActuelle

        ) {

            thumbnail.classList.add("active");

        }


        thumbnail.onclick = function() {

            photoActuelle = i;

            afficherPhoto();

        };


        thumbnails.appendChild(thumbnail);

    }

}


/*
    PHOTO SUIVANTE
*/

function photoSuivante() {

    photoActuelle =

        (

            photoActuelle + 1

        )

        %

        toutesLesPhotos.length;


    afficherPhoto();

}


/*
    PHOTO PRÉCÉDENTE
*/

function photoPrecedente() {

    photoActuelle =

        (

            photoActuelle - 1 +

            toutesLesPhotos.length

        )

        %

        toutesLesPhotos.length;


    afficherPhoto();

}


/*
    NAVIGATION
*/

document.getElementById("next").onclick = photoSuivante;

document.getElementById("previous").onclick = photoPrecedente;

document.getElementById("fullscreenNext").onclick = photoSuivante;

document.getElementById("fullscreenPrevious").onclick = photoPrecedente;


/*
    PASSAGE EN PLEIN ÉCRAN
*/

mainPhoto.onclick = function() {

    fullscreen.classList.add("active");

    document.body.style.overflow = "hidden";

};


/*
    FERMETURE DU VISIONNEUR
*/

document.getElementById("close").onclick = function() {

    viewer.classList.remove("active");

    document.body.style.overflow = "";

};


document.getElementById("fullscreenClose").onclick = function() {

    fullscreen.classList.remove("active");

};


/*
    TÉLÉCHARGER UNE PHOTO
*/

document.getElementById("downloadPhoto").onclick = function() {

    const photo = toutesLesPhotos[photoActuelle];


    const lien = document.createElement("a");


    lien.href = dossier + photo;


    lien.download = photo;


    lien.click();

};


/*
    TÉLÉCHARGER LE GROUPE

    Ici, on télécharge toutes les photos.
*/

document.getElementById("downloadGroup").onclick = function() {

    toutesLesPhotos.forEach(

        function(photo, index) {

            setTimeout(

                function() {

                    const lien = document.createElement("a");


                    lien.href = dossier + photo;


                    lien.download = photo;


                    lien.click();

                },

                index * 300

            );

        }

    );

};


/*
    CLAVIER
*/

document.addEventListener(

    "keydown",

    function(event) {


        if (

            event.key === "ArrowRight"

        ) {

            photoSuivante();

        }


        if (

            event.key === "ArrowLeft"

        ) {

            photoPrecedente();

        }


        if (

            event.key === "Escape"

        ) {


            if (

                fullscreen.classList.contains("active")

            ) {

                fullscreen.classList.remove("active");

            }

            else {

                viewer.classList.remove("active");

                document.body.style.overflow = "";

            }

        }

    }

);


/*
    SWIPE SUR TÉLÉPHONE
*/

let touchStartX = 0;

let touchEndX = 0;


viewer.addEventListener(

    "touchstart",

    function(event) {

        touchStartX = event.changedTouches[0].screenX;

    }

);


viewer.addEventListener(

    "touchend",

    function(event) {

        touchEndX = event.changedTouches[0].screenX;


        const difference =

            touchStartX -

            touchEndX;


        if (

            Math.abs(difference) < 50

        ) {

            return;

        }


        if (

            difference > 0

        ) {

            photoSuivante();

        }

        else {

            photoPrecedente();

        }

    }

);

</script>

</body>

</html>
