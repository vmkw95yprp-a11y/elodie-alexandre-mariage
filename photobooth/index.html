<!DOCTYPE html>

<html lang="fr">

<head>

```
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Le photobooth — Élodie & Alexandre</title>

<style>

    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    body {
        font-family: Arial, Helvetica, sans-serif;
        background: #faf9f7;
        color: #333;
    }

    .page {
        min-height: 100vh;
        padding: 40px 20px 70px;
    }

    .header {
        max-width: 850px;
        margin: auto;
        text-align: center;
        margin-bottom: 50px;
    }

    .logo {
        width: 100px;
        max-width: 35vw;
        margin-bottom: 20px;
    }

    .back {
        display: inline-block;
        margin-bottom: 30px;
        color: #72000b;
        text-decoration: none;
        font-size: 0.95rem;
    }

    .back:hover {
        text-decoration: underline;
    }

    h1 {
        font-family: Georgia, serif;
        font-size: clamp(2.4rem, 7vw, 4.5rem);
        font-weight: normal;
        color: #72000b;
        margin-bottom: 15px;
    }

    .intro {
        font-size: 1.1rem;
        line-height: 1.7;
        max-width: 650px;
        margin: auto;
    }

    .gallery {
        max-width: 1100px;
        margin: auto;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
    }

    .photo-card {
        position: relative;
        background: white;
        border: 1px solid #e2d2d3;
        padding: 8px;
        cursor: pointer;
        transition: 0.3s ease;
    }

    .photo-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 25px rgba(114, 0, 11, 0.15);
    }

    .photo-card img {
        width: 100%;
        aspect-ratio: 1 / 1;
        object-fit: cover;
        display: block;
    }

    .photo-count {
        position: absolute;
        right: 18px;
        bottom: 18px;
        background: rgba(114, 0, 11, 0.9);
        color: white;
        padding: 7px 11px;
        font-size: 0.85rem;
        border-radius: 3px;
    }

    .lightbox {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 1000;
        background: rgba(0, 0, 0, 0.92);
        padding: 25px;
        overflow-y: auto;
    }

    .lightbox.active {
        display: block;
    }

    .close {
        position: fixed;
        top: 20px;
        right: 25px;
        color: white;
        font-size: 2.5rem;
        cursor: pointer;
        z-index: 1002;
    }

    .lightbox-content {
        max-width: 1100px;
        margin: 45px auto 20px;
    }

    .main-photo {
        width: 100%;
        max-height: 70vh;
        object-fit: contain;
        display: block;
        margin: auto;
    }

    .associated-photos {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 15px;
        margin-top: 20px;
    }

    .associated-photos img {
        width: 100%;
        max-height: 300px;
        object-fit: contain;
        background: #111;
    }

    .photo-title {
        color: white;
        text-align: center;
        margin-top: 20px;
        font-family: Georgia, serif;
        font-size: 1.2rem;
    }

    .footer {
        text-align: center;
        margin-top: 60px;
        color: #72000b;
        font-family: Georgia, serif;
        font-size: 1.3rem;
    }

    @media (max-width: 800px) {

        .gallery {
            grid-template-columns: repeat(2, 1fr);
        }

        .associated-photos {
            grid-template-columns: repeat(2, 1fr);
        }

    }

    @media (max-width: 500px) {

        .page {
            padding: 30px 15px 50px;
        }

        .gallery {
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .photo-card {
            padding: 5px;
        }

        .photo-count {
            right: 10px;
            bottom: 10px;
            font-size: 0.7rem;
            padding: 5px 7px;
        }

        .associated-photos {
            grid-template-columns: 1fr;
        }

    }

</style>
```

</head>

<body>

```
<main class="page">

    <header class="header">

        <a href="../" class="back">
            ← Retour à notre mariage
        </a>

        <br>

        <img
            src="../images/style/logo.jpg"
            alt="Monogramme Élodie et Alexandre"
            class="logo"
        >

        <h1>
            Le photobooth 📸
        </h1>

        <p class="intro">
            Parce qu'une photo ne suffisait parfois pas à immortaliser
            nos grimaces, nos rires et nos poses les plus improbables ❤️
        </p>

    </header>

    <section
        class="gallery"
        id="gallery"
    ></section>

    <footer class="footer">
        ❤️ Élodie & Alexandre ❤️
    </footer>

</main>


<div
    class="lightbox"
    id="lightbox"
>

    <span
        class="close"
        id="close"
    >
        &times;
    </span>

    <div class="lightbox-content">

        <img
            id="mainPhoto"
            class="main-photo"
            src=""
            alt=""
        >

        <div
            id="associatedPhotos"
            class="associated-photos"
        ></div>

        <p
            id="photoTitle"
            class="photo-title"
        ></p>

    </div>

</div>


<script>

    const groupes = [

        {
            principale: "20260523_184901_640.jpg",

            photos: [
                "IMG_7134_20260523_184837_3600.JPG",
                "IMG_7135_20260523_184846_3600.JPG"
            ]

        },

        {
            principale: "20260523_185252_043.jpg",

            photos: [
                "IMG_7137_20260523_185230_3600.JPG",
                "IMG_7138_20260523_185238_3600.JPG"
            ]

        },

        {
            principale: "20260523_185417_189.jpg",

            photos: [
                "IMG_7139_20260523_185407_3600.JPG"
            ]

        },

        {
            principale: "20260523_185728_781.jpg",

            photos: [
                "IMG_7143_20260523_185723_3600.JPG"
            ]

        },

        {
            principale: "20260523_190444_650.jpg",

            photos: [
                "IMG_7146_20260523_190434_3600.JPG"
            ]

        },

        {
            principale: "20260523_190619_012_1x.jpg",

            photos: [
                "IMG_7147_20260523_190544_3600.JPG",
                "IMG_7148_20260523_190552_3600.JPG",
                "IMG_7149_20260523_190601_3600.JPG"
            ]

        }

    ];


    const dossierImages =
        "../images/photobooth/";


    const gallery =
        document.getElementById("gallery");


    const lightbox =
        document.getElementById("lightbox");


    const mainPhoto =
        document.getElementById("mainPhoto");


    const associatedPhotos =
        document.getElementById("associatedPhotos");


    const photoTitle =
        document.getElementById("photoTitle");


    const close =
        document.getElementById("close");


    groupes.forEach((groupe) => {


        const card =
            document.createElement("div");


        card.className =
            "photo-card";


        card.innerHTML = `

            <img

                src="${dossierImages}${groupe.principale}"

                alt="Photo du photobooth"

            >


            <span class="photo-count">

                ${groupe.photos.length}

                photo${groupe.photos.length > 1 ? "s" : ""}

            </span>

        `;


        card.addEventListener(
            "click",
            () => {


                mainPhoto.src =
                    dossierImages +
                    groupe.principale;


                associatedPhotos.innerHTML =
                    "";


                groupe.photos.forEach(
                    (photo) => {


                        const img =
                            document.createElement(
                                "img"
                            );


                        img.src =
                            dossierImages +
                            photo;


                        img.alt =
                            "Photo du photobooth";


                        associatedPhotos.appendChild(
                            img
                        );

                    }
                );


                photoTitle.textContent =

                    `${groupe.photos.length}

                    photo${groupe.photos.length > 1 ? "s" : ""}

                    associée${groupe.photos.length > 1 ? "s" : ""}`;


                lightbox.classList.add(
                    "active"
                );


                document.body.style.overflow =
                    "hidden";

            }
        );

    });


    close.addEventListener(
        "click",
        fermerLightbox
    );


    lightbox.addEventListener(
        "click",
        (event) => {


            if (
                event.target ===
                lightbox
            ) {


                fermerLightbox();

            }

        }
    );


    function fermerLightbox() {


        lightbox.classList.remove(
            "active"
        );


        document.body.style.overflow =
            "";

    }


    document.addEventListener(
        "keydown",
        (event) => {


            if (
                event.key ===
                "Escape"
            ) {


                fermerLightbox();

            }

        }
    );

</script>
```

</body>

</html>
