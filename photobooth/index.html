<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Photobooth — Élodie & Alexandre</title>


<style>

/* =========================
   STYLE GÉNÉRAL
========================= */

* {

    box-sizing: border-box;

}


body {

    margin: 0;

    font-family: Arial, sans-serif;

    background: #faf9f7;

    color: #333;

    text-align: center;

}


h1 {

    margin: 30px 0 10px;

    font-size: 28px;

}


/* =========================
   GALERIE
========================= */

.gallery {

    display: grid;

    grid-template-columns: repeat(3, 1fr);

    gap: 20px;

    max-width: 1000px;

    margin: 40px auto;

    padding: 0 20px;

}


.photo {

    aspect-ratio: 1 / 1;

    overflow: hidden;

    cursor: pointer;

    transition: transform 0.2s ease;

}


.photo:hover {

    transform: scale(1.04);

}


.photo img {

    width: 100%;

    height: 100%;

    object-fit: cover;

    display: block;

}


/* =========================
   FENÊTRE PRINCIPALE
========================= */

.viewer {

    display: none;

    position: fixed;

    inset: 0;

    background: rgba(0, 0, 0, 0.94);

    z-index: 100;

    align-items: center;

    justify-content: center;

    padding: 20px;

}


.viewer.active {

    display: flex;

}


.viewer-content {

    width: 100%;

    max-width: 1200px;

}


/* =========================
   PHOTO PRINCIPALE
========================= */

.main-photo-container {

    height: 70vh;

    display: flex;

    align-items: center;

    justify-content: center;

}


.main-photo {

    max-width: 100%;

    max-height: 70vh;

    object-fit: contain;

    cursor: zoom-in;

}


/* =========================
   MODE PLEIN ÉCRAN
========================= */

.fullscreen {

    display: none;

    position: fixed;

    inset: 0;

    background: black;

    z-index: 300;

    align-items: center;

    justify-content: center;

}


.fullscreen.active {

    display: flex;

}


.fullscreen img {

    max-width: 100vw;

    max-height: 100vh;

    object-fit: contain;

}


.fullscreen-close {

    position: fixed;

    top: 15px;

    right: 25px;

    color: white;

    font-size: 42px;

    cursor: pointer;

    z-index: 310;

}


/* =========================
   FLÈCHES
========================= */

.arrow {

    position: fixed;

    top: 50%;

    transform: translateY(-50%);

    border: none;

    background: rgba(255, 255, 255, 0.15);

    color: white;

    font-size: 45px;

    width: 55px;

    height: 80px;

    cursor: pointer;

    z-index: 110;

}


.arrow:hover {

    background: rgba(255, 255, 255, 0.35);

}


.arrow-left {

    left: 20px;

}


.arrow-right {

    right: 20px;

}


/* =========================
   MINIATURES
========================= */

.thumbnails {

    display: flex;

    justify-content: center;

    align-items: center;

    gap: 10px;

    margin-top: 20px;

    overflow: hidden;

    min-height: 90px;

}


.thumbnail {

    width: 75px;

    height: 75px;

    aspect-ratio: 1 / 1;

    object-fit: cover;

    opacity: 0.45;

    cursor: pointer;

    border: 2px solid transparent;

}


.thumbnail.active {

    opacity: 1;

    border-color: white;

    transform: scale(1.08);

}


/* =========================
   BOUTONS
========================= */

.actions {

    display: flex;

    justify-content: center;

    gap: 12px;

    margin-top: 20px;

    flex-wrap: wrap;

}


.actions button {

    border: none;

    padding: 10px 16px;

    cursor: pointer;

    font-size: 14px;

    border-radius: 4px;

}


.download {

    background: white;

    color: #222;

}


.download-group {

    background: #72000b;

    color: white;

}


/* =========================
   FERMER
========================= */

.close {

    position: fixed;

    top: 15px;

    right: 25px;

    color: white;

    font-size: 42px;

    cursor: pointer;

    z-index: 120;

}


/* =========================
   COMPTEUR
========================= */

.counter {

    color: white;

    margin-top: 12px;

    font-size: 14px;

    opacity: 0.8;

}


/* =========================
   MOBILE
========================= */

@media (max-width: 700px) {


    h1 {

        font-size: 23px;

        margin-top: 22px;

    }


    .gallery {

        grid-template-columns: repeat(2, 1fr);

        gap: 8px;

        padding: 0 8px;

        margin-top: 25px;

    }


    .viewer {

        padding: 10px;

    }


    .main-photo-container {

        height: 65vh;

    }


    .main-photo {

        max-width: 90vw;

        max-height: 65vh;

    }


    .arrow {

        width: 38px;

        height: 58px;

        font-size: 30px;

    }


    .arrow-left {

        left: 3px;

    }


    .arrow-right {

        right: 3px;

    }


    .thumbnail {

        width: 55px;

        height: 55px;

        aspect-ratio: 1 / 1;

    }


    .actions button {

        font-size: 13px;

        padding: 9px 12px;

    }

}

</style>

</head>


<body>


<h1>Le photobooth 📸</h1>


<div
    class="gallery"
    id="gallery">

</div>


<!-- =========================
     FENÊTRE PRINCIPALE
========================= -->

<div
    class="viewer"
    id="viewer">


    <span
        class="close"
        id="close">

        &times;

    </span>


    <button
        class="arrow arrow-left"
        id="previous">

        ‹

    </button>


    <button
        class="arrow arrow-right"
        id="next">

        ›

    </button>


    <div
        class="viewer-content">


        <div
            class="main-photo-container">


            <img
                id="mainPhoto"
                class="main-photo">


        </div>


        <div
            id="thumbnails"
            class="thumbnails">

        </div>


        <div
            class="actions">


            <button
                class="download"
                id="downloadPhoto">

                ⬇️ Télécharger cette photo

            </button>


            <button
                class="download-group"
                id="downloadGroup">

                📦 Télécharger le groupe

            </button>


        </div>


        <div
            id="counter"
            class="counter">

        </div>


    </div>


</div>


<!-- =========================
     MODE PLEIN ÉCRAN
========================= -->

<div
    class="fullscreen"
    id="fullscreen">


    <span
        class="fullscreen-close"
        id="fullscreenClose">

        &times;

    </span>


    <button
        class="arrow arrow-left"
        id="fullscreenPrevious">

        ‹

    </button>


    <img
        id="fullscreenPhoto">


    <button
        class="arrow arrow-right"
        id="fullscreenNext">

        ›

    </button>


</div>


<script>


/* =========================
   DOSSIER DES PHOTOS
========================= */

const dossier = "../images/photobooth/";


/* =========================
   PHOTOS PRINCIPALES
=========================

   COLLE ICI TA LISTE COMPLÈTE
   DES PHOTOS PRINCIPALES

   Exemple :

   const photos = [

       "20260523_184901_640.jpg",
       "20260523_185252_043.jpg"

   ];

*/

const photos = [

    /* COLLE ICI TA LISTE photos */

];


/* =========================
   PHOTOS DU PHOTOGRAPHE
=========================

   COLLE ICI TA LISTE COMPLÈTE
   DES PHOTOS IMG_...

   Exemple :

   const photosPhotographe = [

       "IMG_7134_20260523_184837_3600.JPG",
       "IMG_7135_20260523_184846_3600.JPG"

   ];

*/

const photosPhotographe = [

    /* COLLE ICI TA LISTE photosPhotographe */

];


/* =========================
   EXTRACTION DE LA DATE
========================= */

function obtenirDatePhoto(nom) {


    const correspondance = nom.match(

        /(\d{8})_(\d{6})/

    );


    if (!correspondance) {

        return 0;

    }


    return Number(

        correspondance[1] +

        correspondance[2]

    );

}


/* =========================
   TRI DES PHOTOS PRINCIPALES
========================= */

const photosPrincipales = photos

    .map(function(photo) {


        return {

            nom: photo,

            date: obtenirDatePhoto(photo)

        };


    })


    .sort(function(a, b) {


        return a.date - b.date;


    });


/* =========================
   TRI DES PHOTOS DU PHOTOGRAPHE
========================= */

const photosPhotographeTriees = photosPhotographe

    .map(function(photo) {


        return {

            nom: photo,

            date: obtenirDatePhoto(photo)

        };


    })


    .sort(function(a, b) {


        return a.date - b.date;


    });


/* =========================
   CRÉATION DES GROUPES
========================= */

const groupes = [];


photosPrincipales.forEach(function(photoPrincipale, index) {


    const dateDebut = photoPrincipale.date;


    const dateFin =

        index < photosPrincipales.length - 1

            ? photosPrincipales[index + 1].date

            : Infinity;


    /*
        On récupère les photos IMG_...

        qui sont juste avant la photo principale
        et jusqu'à la photo principale suivante.

        Exemple :

        18:48:37 IMG
        18:48:46 IMG
        18:49:01 PHOTO PRINCIPALE

        Ces deux photos sont rattachées
        à la photo principale de 18:49:01.
    */


    const photosDuGroupe = photosPhotographeTriees

        .filter(function(photo) {


            return (

                photo.date >= dateDebut - 60 &&

                photo.date < dateFin

            );


        });


    /*
        MAXIMUM DE 3 PHOTOS PAR GROUPE
    */

    const photosDuGroupeLimitees =

        photosDuGroupe.slice(0, 3);


    /*
        On crée le groupe uniquement
        s'il contient au moins une photo.
    */


    if (photosDuGroupeLimitees.length > 0) {


        groupes.push({


            principale: photoPrincipale.nom,


            photos: photosDuGroupeLimitees.map(function(photo) {


                return photo.nom;


            })


        });


    }

});


/* =========================
   ÉLÉMENTS HTML
========================= */

const gallery = document.getElementById("gallery");


const viewer = document.getElementById("viewer");


const fullscreen = document.getElementById("fullscreen");


const mainPhoto = document.getElementById("mainPhoto");


const fullscreenPhoto = document.getElementById("fullscreenPhoto");


const thumbnails = document.getElementById("thumbnails");


const counter = document.getElementById("counter");


let groupeActuel = 0;


let photoActuelle = 0;


/* =========================
   CRÉATION DE LA GALERIE
=========================

   IMPORTANT :

   La vignette utilise la première
   photo IMG_... du groupe.

   La photo principale n'est jamais utilisée
   comme vignette.
========================= */

groupes.forEach(function(groupe, index) {


    const div = document.createElement("div");


    div.className = "photo";


    const img = document.createElement("img");


    /*
        PREMIÈRE PHOTO DU GROUPE

        Exemple :

        IMG_7134_...
    */


    img.src = dossier + groupe.photos[0];


    img.loading = "lazy";


    div.appendChild(img);


    div.onclick = function() {


        groupeActuel = index;


        photoActuelle = 0;


        afficherPhoto();


        viewer.classList.add("active");


        document.body.style.overflow = "hidden";


    };


    gallery.appendChild(div);


});


/* =========================
   AFFICHER LA PHOTO
========================= */

function afficherPhoto() {


    const groupe = groupes[groupeActuel];


    const photo = groupe.photos[photoActuelle];


    mainPhoto.src = dossier + photo;


    fullscreenPhoto.src = dossier + photo;


    counter.textContent =

        "Groupe "

        + (groupeActuel + 1)

        + " / "

        + groupes.length

        + " — Photo "

        + (photoActuelle + 1)

        + " / "

        + groupe.photos.length;


    afficherMiniatures();


}


/* =========================
   MINIATURES
========================= */

function afficherMiniatures() {


    thumbnails.innerHTML = "";


    const groupe = groupes[groupeActuel];


    groupe.photos.forEach(function(photo, index) {


        const thumbnail = document.createElement("img");


        thumbnail.src = dossier + photo;


        thumbnail.className = "thumbnail";


        if (index === photoActuelle) {


            thumbnail.classList.add("active");


        }


        thumbnail.onclick = function() {


            photoActuelle = index;


            afficherPhoto();


        };


        thumbnails.appendChild(thumbnail);


    });


}


/* =========================
   PHOTO SUIVANTE
========================= */

function photoSuivante() {


    const groupe = groupes[groupeActuel];


    photoActuelle =


        (photoActuelle + 1)

        %

        groupe.photos.length;


    afficherPhoto();


}


/* =========================
   PHOTO PRÉCÉDENTE
========================= */

function photoPrecedente() {


    const groupe = groupes[groupeActuel];


    photoActuelle =


        (


            photoActuelle - 1 +

            groupe.photos.length


        )

        %

        groupe.photos.length;


    afficherPhoto();


}


/* =========================
   NAVIGATION
========================= */

document.getElementById("next").onclick =

    photoSuivante;


document.getElementById("previous").onclick =

    photoPrecedente;


document.getElementById("fullscreenNext").onclick =

    photoSuivante;


document.getElementById("fullscreenPrevious").onclick =

    photoPrecedente;


/* =========================
   PLEIN ÉCRAN
========================= */

mainPhoto.onclick = function() {


    fullscreen.classList.add("active");


    document.body.style.overflow = "hidden";


};


document.getElementById("fullscreenClose").onclick = function() {


    fullscreen.classList.remove("active");


};


/* =========================
   FERMETURE
========================= */

document.getElementById("close").onclick = function() {


    viewer.classList.remove("active");


    fullscreen.classList.remove("active");


    document.body.style.overflow = "";


};


/* =========================
   TÉLÉCHARGER UNE PHOTO
========================= */

document.getElementById("downloadPhoto").onclick = function() {


    const groupe = groupes[groupeActuel];


    const photo = groupe.photos[photoActuelle];


    const lien = document.createElement("a");


    lien.href = dossier + photo;


    lien.download = photo;


    lien.click();


};


/* =========================
   TÉLÉCHARGER LE GROUPE
========================= */

document.getElementById("downloadGroup").onclick = function() {


    const groupe = groupes[groupeActuel];


    groupe.photos.forEach(function(photo, index) {


        setTimeout(function() {


            const lien = document.createElement("a");


            lien.href = dossier + photo;


            lien.download = photo;


            lien.click();


        }, index * 300);


    });


};


/* =========================
   CLAVIER
========================= */

document.addEventListener("keydown", function(event) {


    if (

        !viewer.classList.contains("active")

    ) {


        return;


    }


    if (event.key === "ArrowRight") {


        photoSuivante();


    }


    if (event.key === "ArrowLeft") {


        photoPrecedente();


    }


    if (event.key === "Escape") {


        if (

            fullscreen.classList.contains("active")

        ) {


            fullscreen.classList.remove("active");


        }

        else {


            viewer.classList.remove("active");


            document.body.style.overflow = "";


        }


    }


});


/* =========================
   SWIPE MOBILE
========================= */

let touchStartX = 0;


let touchEndX = 0;


viewer.addEventListener("touchstart", function(event) {


    touchStartX = event.changedTouches[0].screenX;


});


viewer.addEventListener("touchend", function(event) {


    touchEndX = event.changedTouches[0].screenX;


    const difference = touchStartX - touchEndX;


    if (Math.abs(difference) < 50) {


        return;


    }


    if (difference > 0) {


        photoSuivante();


    }

    else {


        photoPrecedente();


    }


});


</script>

</body>

</html>
