<!DOCTYPE html>

<html lang="fr">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Photobooth — Élodie & Alexandre</title>

<style>

* {
    box-sizing: border-box;
}


body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #faf9f7;
    color: #333;
    text-align: center;
}


h1 {
    margin: 30px 0 10px;
}


.gallery {

    display: grid;

    grid-template-columns: repeat(3, 1fr);

    gap: 20px;

    max-width: 1000px;

    margin: 40px auto;

    padding: 0 20px;

}


.photo {

    aspect-ratio: 1 / 1;

    overflow: hidden;

    cursor: pointer;

    transition: transform 0.2s ease;

}


.photo:hover {

    transform: scale(1.05);

}


.photo img {

    width: 100%;

    height: 100%;

    object-fit: cover;

    display: block;

}


/* FENÊTRE PRINCIPALE */


.viewer {

    display: none;

    position: fixed;

    inset: 0;

    background: rgba(0, 0, 0, 0.94);

    z-index: 100;

    align-items: center;

    justify-content: center;

    padding: 30px;

}


.viewer.active {

    display: flex;

}


.viewer-content {

    width: 100%;

    max-width: 1200px;

}


/* PHOTO PRINCIPALE */


.main-photo-container {

    height: 70vh;

    display: flex;

    align-items: center;

    justify-content: center;

}


.main-photo {

    max-width: 100%;

    max-height: 70vh;

    object-fit: contain;

    cursor: zoom-in;

}


/* PLEIN ÉCRAN */


.fullscreen {

    display: none;

    position: fixed;

    inset: 0;

    background: black;

    z-index: 300;

    align-items: center;

    justify-content: center;

}


.fullscreen.active {

    display: flex;

}


.fullscreen img {

    max-width: 100vw;

    max-height: 100vh;

    object-fit: contain;

}


.fullscreen-close {

    position: fixed;

    top: 20px;

    right: 30px;

    color: white;

    font-size: 42px;

    cursor: pointer;

    z-index: 310;

}


/* FLÈCHES */


.arrow {

    position: fixed;

    top: 50%;

    transform: translateY(-50%);

    border: none;

    background: rgba(255, 255, 255, 0.15);

    color: white;

    font-size: 45px;

    width: 55px;

    height: 80px;

    cursor: pointer;

    z-index: 110;

}


.arrow:hover {

    background: rgba(255, 255, 255, 0.35);

}


.arrow-left {

    left: 20px;

}


.arrow-right {

    right: 20px;

}


/* MINIATURES */


.thumbnails {

    display: flex;

    justify-content: center;

    align-items: center;

    gap: 10px;

    margin-top: 20px;

    overflow: hidden;

    min-height: 90px;

}


.thumbnail {

    width: 75px;

    height: 75px;

    object-fit: cover;

    opacity: 0.45;

    cursor: pointer;

    border: 2px solid transparent;

}


.thumbnail.active {

    opacity: 1;

    border-color: white;

    transform: scale(1.08);

}


/* BOUTONS */


.actions {

    display: flex;

    justify-content: center;

    gap: 12px;

    margin-top: 20px;

    flex-wrap: wrap;

}


.actions button {

    border: none;

    padding: 10px 16px;

    cursor: pointer;

    font-size: 14px;

    border-radius: 4px;

}


.download {

    background: white;

    color: #222;

}


.download-group {

    background: #72000b;

    color: white;

}


/* FERMER */


.close {

    position: fixed;

    top: 15px;

    right: 25px;

    color: white;

    font-size: 42px;

    cursor: pointer;

    z-index: 120;

}


/* COMPTEUR */


.counter {

    color: white;

    margin-top: 12px;

    font-size: 14px;

    opacity: 0.8;

}


@media (max-width: 700px) {


    .gallery {

        grid-template-columns: repeat(2, 1fr);

        gap: 10px;

        padding: 0 10px;

    }


    .viewer {

        padding: 15px;

    }


    .main-photo-container {

        height: 65vh;

    }


    .main-photo {

        max-height: 65vh;

        max-width: 90vw;

    }


    .arrow {

        width: 40px;

        height: 60px;

        font-size: 30px;

    }


    .arrow-left {

        left: 5px;

    }


    .arrow-right {

        right: 5px;

    }


    .thumbnail {

        width: 60px;

        height: 60px;

    }

}


</style>

</head>

<body>

<h1>

```
Le photobooth 📸
```

</h1>

<div

```
class="gallery"

id="gallery"
```

>

</div>

<!-- FENÊTRE PRINCIPALE -->

<div

```
class="viewer"

id="viewer"
```

>

```
<span

    class="close"

    id="close"

>

    &times;

</span>


<button

    class="arrow arrow-left"

    id="previous"

>

    ‹

</button>


<button

    class="arrow arrow-right"

    id="next"

>

    ›


</button>


<div

    class="viewer-content"

>


    <div

        class="main-photo-container"

    >


        <img

            id="mainPhoto"

            class="main-photo"

        >


    </div>


    <div

        id="thumbnails"

        class="thumbnails"

    >

    </div>


    <div

        class="actions"

    >


        <button

            class="download"

            id="downloadPhoto"

        >

            ⬇️ Télécharger cette photo

        </button>


        <button

            class="download-group"

            id="downloadGroup"

        >

            📦 Télécharger le groupe

        </button>


    </div>


    <div

        id="counter"

        class="counter"

    >

    </div>


</div>
```

</div>

<!-- MODE PLEIN ÉCRAN -->

<div

```
class="fullscreen"

id="fullscreen"
```

>

```
<span

    class="fullscreen-close"

    id="fullscreenClose"

>

    &times;

</span>


<button

    class="arrow arrow-left"

    id="fullscreenPrevious"

>

    ‹

</button>


<img

    id="fullscreenPhoto"

>


<button

    class="arrow arrow-right"

    id="fullscreenNext"

>

    ›


</button>
```

</div>

<script>


const dossier =

    "../images/photobooth/";



/*

    IMPORTANT :

    Les groupes sont placés dans l'ordre chronologique.

    Dans chaque groupe :

    - "principale" est affichée en premier au clic

    - "photos" contient les photos IMG_... dans l'ordre chronologique

*/


const groupes = [


    {


        principale:

            "20260523_184901_640.jpg",


        photos: [


            "IMG_7134_20260523_184837_3600.JPG",


            "IMG_7135_20260523_184846_3600.JPG"


        ]


    },


    {


        principale:

            "20260523_185252_043.jpg",


        photos: [


            "IMG_7137_20260523_185230_3600.JPG",


            "IMG_7138_20260523_185238_3600.JPG"


        ]


    },


    {


        principale:

            "20260523_185417_189.jpg",


        photos: [


            "IMG_7139_20260523_185407_3600.JPG"


        ]


    },


    {


        principale:

            "20260523_185728_781.jpg",


        photos: [


            "IMG_7143_20260523_185723_3600.JPG"


        ]


    },


    {


        principale:

            "20260523_190444_650.jpg",


        photos: [


            "IMG_7146_20260523_190434_3600.JPG"


        ]


    },


    {


        principale:

            "20260523_190619_012_1x.jpg",


        photos: [


            "IMG_7147_20260523_190544_3600.JPG",


            "IMG_7148_20260523_190552_3600.JPG",


            "IMG_7149_20260523_190601_3600.JPG"


        ]


    }


];



const gallery =

    document.getElementById(

        "gallery"

    );


const viewer =

    document.getElementById(

        "viewer"

    );


const fullscreen =

    document.getElementById(

        "fullscreen"

    );


const mainPhoto =

    document.getElementById(

        "mainPhoto"

    );


const fullscreenPhoto =

    document.getElementById(

        "fullscreenPhoto"

    );


const thumbnails =

    document.getElementById(

        "thumbnails"

    );


const counter =

    document.getElementById(

        "counter"

    );


let groupeActuel =

    null;


let photoActuelle =

    0;



/*

    Les photos affichées sont :

    1. La photo principale sans IMG_

    2. Les photos IMG_... dans l'ordre chronologique

*/


function obtenirPhotos(

    groupe

) {


    return [


        groupe.principale,


        ...groupe.photos


    ];


}



/* CRÉATION DES VIGNETTES */


groupes.forEach(


    function(groupe) {


        const div =

            document.createElement(

                "div"

            );


        div.className =

            "photo";


        const img =

            document.createElement(

                "img"

            );


        /*

            La vignette est toujours

            la première photo IMG_...

        */


        img.src =

            dossier +

            groupe.photos[0];


        div.appendChild(

            img

        );


        div.onclick =

            function() {


                groupeActuel =

                    groupe;


                /*

                    La photo principale apparaît

                    toujours en premier

                */


                photoActuelle =

                    0;


                afficherPhoto();


                viewer.classList.add(

                    "active"

                );


                document.body.style.overflow =

                    "hidden";


            };


        gallery.appendChild(

            div

        );


    }


);



/* AFFICHER PHOTO */


function afficherPhoto() {


    const photos =

        obtenirPhotos(

            groupeActuel

        );


    const photo =

        photos[

            photoActuelle

        ];


    mainPhoto.src =

        dossier +

        photo;


    fullscreenPhoto.src =

        dossier +

        photo;


    counter.textContent =

        (

            photoActuelle +

            1

        ) +

        " / " +

        photos.length;


    afficherMiniatures(

        photos

    );


}



/* MINIATURES */


function afficherMiniatures(

    photos

) {


    thumbnails.innerHTML =

        "";


    let debut =

        Math.max(

            0,

            photoActuelle -

            2

        );


    let fin =

        Math.min(

            photos.length,

            photoActuelle +

            3

        );


    for (


        let i = debut;


        i < fin;


        i++


    ) {


        const thumbnail =

            document.createElement(

                "img"

            );


        thumbnail.src =

            dossier +

            photos[i];


        thumbnail.className =

            "thumbnail";


        if (


            i ===

            photoActuelle


        ) {


            thumbnail.classList.add(

                "active"

            );


        }


        thumbnail.onclick =

            function() {


                photoActuelle =

                    i;


                afficherPhoto();


            };


        thumbnails.appendChild(

            thumbnail

        );


    }


}



/* PHOTO SUIVANTE */


function photoSuivante() {


    const photos =

        obtenirPhotos(

            groupeActuel

        );


    photoActuelle =


        (


            photoActuelle +

            1


        ) %


        photos.length;


    afficherPhoto();


}



/* PHOTO PRÉCÉDENTE */


function photoPrecedente() {


    const photos =

        obtenirPhotos(

            groupeActuel

        );


    photoActuelle =


        (


            photoActuelle -

            1 +

            photos.length


        ) %


        photos.length;


    afficherPhoto();


}



/* NAVIGATION */


document.getElementById(

    "next"

).onclick =

    photoSuivante;


document.getElementById(

    "previous"

).onclick =

    photoPrecedente;


document.getElementById(

    "fullscreenNext"

).onclick =

    photoSuivante;


document.getElementById(

    "fullscreenPrevious"

).onclick =

    photoPrecedente;



/* CLIC SUR LA PHOTO */


mainPhoto.onclick =

    function() {


        fullscreen.classList.add(

            "active"

        );


        document.body.style.overflow =

            "hidden";


    };



/* FERMETURE */


document.getElementById(

    "close"

).onclick =

    function() {


        viewer.classList.remove(

            "active"

        );


        document.body.style.overflow =

            "";


    };


document.getElementById(

    "fullscreenClose"

).onclick =

    function() {


        fullscreen.classList.remove(

            "active"

        );


    };



/* TÉLÉCHARGER LA PHOTO */


document.getElementById(

    "downloadPhoto"

).onclick =

    function() {


        const photos =

            obtenirPhotos(

                groupeActuel

            );


        const lien =

            document.createElement(

                "a"

            );


        lien.href =

            dossier +

            photos[

                photoActuelle

            ];


        lien.download =

            photos[

                photoActuelle

            ];


        lien.click();


    };



/* TÉLÉCHARGER LE GROUPE */


document.getElementById(

    "downloadGroup"

).onclick =

    function() {


        const photos =

            obtenirPhotos(

                groupeActuel

            );


        photos.forEach(


            function(photo, index) {


                setTimeout(


                    function() {


                        const lien =

                            document.createElement(

                                "a"

                            );


                        lien.href =

                            dossier +

                            photo;


                        lien.download =

                            photo;


                        lien.click();


                    },


                    index *

                    500


                );


            }


        );


    };



/* CLAVIER */


document.addEventListener(


    "keydown",


    function(


        event


    ) {


        if (


            fullscreen.classList.contains(


                "active"


            )


        ) {


            if (


                event.key ===

                "ArrowRight"


            ) {


                photoSuivante();


            }


            if (


                event.key ===

                "ArrowLeft"


            ) {


                photoPrecedente();


            }


            if (


                event.key ===

                "Escape"


            ) {


                fullscreen.classList.remove(


                    "active"


                );


            }


            return;


        }


        if (


            !viewer.classList.contains(


                "active"


            )


        ) {


            return;


        }


        if (


            event.key ===

            "ArrowRight"


        ) {


            photoSuivante();


        }


        if (


            event.key ===

            "ArrowLeft"


        ) {


            photoPrecedente();


        }


        if (


            event.key ===

            "Escape"


        ) {


            viewer.classList.remove(


                "active"


            );


            document.body.style.overflow =

                "";


        }


    }


);


</script>

</body>

</html>
