<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photobooth</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #faf9f7;
            text-align: center;
            padding: 30px;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            max-width: 1000px;
            margin: 40px auto;
        }

        .photo {
            cursor: pointer;
            transition: transform 0.2s;
        }

        .photo:hover {
            transform: scale(1.05);
        }

        .photo img {
            width: 100%;
            display: block;
        }

        .viewer {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .viewer.active {
            display: flex;
        }

        .viewer img {
            max-width: 90%;
            max-height: 90%;
        }

        .close {
            position: fixed;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 40px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <h1>Le photobooth 📸</h1>

    <div class="gallery">

        <div class="photo" onclick="ouvrir('20260523_184901_640.jpg')">
            <img src="../images/photobooth/20260523_184901_640.jpg">
        </div>

        <div class="photo" onclick="ouvrir('20260523_185252_043.jpg')">
            <img src="../images/photobooth/20260523_185252_043.jpg">
        </div>

        <div class="photo" onclick="ouvrir('20260523_185417_189.jpg')">
            <img src="../images/photobooth/20260523_185417_189.jpg">
        </div>

        <div class="photo" onclick="ouvrir('20260523_185728_781.jpg')">
            <img src="../images/photobooth/20260523_185728_781.jpg">
        </div>

        <div class="photo" onclick="ouvrir('20260523_190444_650.jpg')">
            <img src="../images/photobooth/20260523_190444_650.jpg">
        </div>

        <div class="photo" onclick="ouvrir('20260523_190619_012_1x.jpg')">
            <img src="../images/photobooth/20260523_190619_012_1x.jpg">
        </div>

    </div>

    <div class="viewer" id="viewer" onclick="fermer()">

        <span class="close">&times;</span>

        <img id="grandePhoto">

    </div>

    <script>

        function ouvrir(photo) {

            document.getElementById("grandePhoto").src =
                "../images/photobooth/" + photo;

            document.getElementById("viewer").classList.add("active");

        }

        function fermer() {

            document.getElementById("viewer").classList.remove("active");

        }

    </script>

</body>
</html>
