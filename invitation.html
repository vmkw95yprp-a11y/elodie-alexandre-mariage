<!DOCTYPE html>
<html lang="fr">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>L'invitation — Élodie & Alexandre</title>

    <style>

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {

            font-family: Georgia, serif;

            background: #f8f6f2;

            color: #333;

        }

        .page {

            max-width: 1200px;

            margin: auto;

            padding: 60px 30px 100px;

        }

        .back {

            display: inline-block;

            margin-bottom: 70px;

            color: #777;

            text-decoration: none;

            font-size: 0.95rem;

        }

        .back:hover {

            color: #333;

        }

        header {

            text-align: center;

            margin-bottom: 90px;

        }

        h1 {

            font-size: clamp(2.8rem, 7vw, 5rem);

            font-weight: normal;

            margin-bottom: 25px;

        }

        .intro {

            max-width: 650px;

            margin: auto;

            font-size: 1.1rem;

            line-height: 1.8;

            color: #666;

        }

        .invitation {

            margin-bottom: 120px;

        }

        h2 {

            text-align: center;

            font-size: 1.8rem;

            font-weight: normal;

            letter-spacing: 1px;

            margin-bottom: 50px;

        }

        .photos {

            display: grid;

            grid-template-columns: repeat(2, minmax(0, 1fr));

            gap: 40px;

            max-width: 900px;

            margin: auto;

        }

        .photo {

            background: white;

            padding: 12px;

            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);

        }

        .photo img {

            width: 100%;

            height: auto;

            display: block;

        }

        @media (max-width: 700px) {

            .page {

                padding: 40px 20px 70px;

            }

            .back {

                margin-bottom: 50px;

            }

            header {

                margin-bottom: 65px;

            }

            .invitation {

                margin-bottom: 80px;

            }

            .photos {

                grid-template-columns: 1fr;

                gap: 30px;

            }

        }

    </style>

</head>

<body>

    <main class="page">


        <a href="index.html" class="back">

            ← Retour au menu

        </a>


        <header>

            <h1>

                L'invitation

            </h1>

            <p class="intro">

                Tout a commencé par une invitation.

                <br><br>

                Retrouvez ici les faire-part qui annonçaient cette journée si particulière.

            </p>

        </header>


        <section class="invitation">

            <h2>

                Faire-part — Vin d'honneur

            </h2>

            <div class="photos">

                <div class="photo">

                    <img

                        src="fairepartvinhonneurrecto.jpg"

                        alt="Faire-part du vin d'honneur — recto"

                    >

                </div>

                <div class="photo">

                    <img

                        src="fairepartvinhonneurverso.jpg"

                        alt="Faire-part du vin d'honneur — verso"

                    >

                </div>

            </div>

        </section>


        <section class="invitation">

            <h2>

                Faire-part — Repas

            </h2>

            <div class="photos">

                <div class="photo">

                    <img

                        src="fairepartrepasrecto.jpg"

                        alt="Faire-part du repas — recto"

                    >

                </div>

                <div class="photo">

                    <img

                        src="fairepartrepasverso.jpg"

                        alt="Faire-part du repas — verso"

                    >

                </div>

            </div>

        </section>


    </main>

</body>

</html>
